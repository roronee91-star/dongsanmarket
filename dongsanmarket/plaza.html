<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>동산지기 광장</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans KR', sans-serif; position: fixed; width: 100%; height: 100%; background: #000; touch-action: none; }

.bg { position: fixed; inset: 0; z-index: 0; background-size: cover; background-position: center top; background-repeat: no-repeat; }

/* 플레이어 */
.player { position: fixed; z-index: 20; display: flex; flex-direction: column; align-items: center; pointer-events: none; transform: translate(-50%, -100%); }
.player-sprite { width: clamp(45px, 6vw, 80px); height: clamp(60px, 8vw, 105px); object-fit: contain; }
.player-shadow { width: clamp(28px, 4vw, 52px); height: clamp(5px, 0.7vw, 9px); background: rgba(0,0,0,0.22); border-radius: 50%; margin-top: -4px; }
.player-name { background: rgba(0,0,0,0.75); color: white; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; white-space: nowrap; margin-top: 3px; }
.player-bubble { background: white; border: 2px solid #58c858; border-radius: 10px; padding: 5px 10px; font-size: 11px; color: #333; position: absolute; bottom: 110%; white-space: normal; word-break: keep-all; max-width: 150px; text-align: center; line-height: 1.4; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
.player-bubble::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:#58c858; }
.player-bubble.quiz-bubble { font-size: 13px; font-weight: 900; min-width: 40px; }
.player-bubble.quiz-pending { border-color: #aaa; }
.player-bubble.quiz-pending::after { border-top-color: #aaa; }
.player-bubble.quiz-correct { border-color: #58c858; background: #e8f5e9; color: #206820; }
.player-bubble.quiz-correct::after { border-top-color: #58c858; }
.player-bubble.quiz-wrong { border-color: #e04040; background: #ffeaea; color: #a00; }
.player-bubble.quiz-wrong::after { border-top-color: #e04040; }
.my-player .player-sprite { filter: drop-shadow(0 0 7px #FFD700); }

/* 상단 바 */
.top-bar { position: fixed; top:0; left:0; right:0; z-index:50; background: rgba(0,20,60,0.82); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #58c858; }
.back-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.top-title { color: #FFD700; font-size: 14px; font-weight: 900; }
.top-right { display:flex; align-items:center; gap:8px; }
.online-badge { background: #58c858; color: white; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 12px; }
.exit-btn { background: rgba(220,50,50,0.85); border: 1px solid rgba(255,100,100,0.5); color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* 접속자 드롭다운 */
.users-panel { position: fixed; top: 36px; right: 8px; z-index:60; background: rgba(0,20,60,0.95); border: 1px solid #58c858; border-radius: 10px; padding: 7px 9px; min-width: 90px; max-width: 120px; display: none; }
.users-title { font-size: 9px; color: #58c858; font-weight: 700; margin-bottom: 5px; }
.user-item { font-size: 10px; color: #eee; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.user-dot { width: 6px; height: 6px; background: #58c858; border-radius: 50%; flex-shrink: 0; }

/* 조이스틱 */
.joystick { position: fixed; left:10px; bottom:58px; z-index:50; width: 120px; height: 120px; display: grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr; gap:4px; }
.jbtn { background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.35); border-radius: 10px; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-select: none; min-width: 38px; min-height: 38px; }
.jbtn.pressed { background: rgba(88,200,88,0.6); }
.jcenter { background: rgba(255,255,255,0.06); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }

/* 채팅 메시지 박스 + 입력창 - 우측 상단 */
.chat-panel { position: fixed; top:48px; right:8px; z-index:50; width: min(320px, 38vw, calc(100vw - 16px)); }
.chat-box { background: rgba(0,20,60,0.82); border: 2px solid #58c858; border-radius: 10px; padding: 8px; height: clamp(120px, 22vh, 180px); overflow-y: scroll; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; display: flex; flex-direction: column; gap: 4px; }
.chat-box::-webkit-scrollbar { width: 4px; }
.chat-box::-webkit-scrollbar-thumb { background: #58c858; border-radius: 2px; }
.chat-msg { font-size: 11px; line-height: 1.4; word-break: break-all; }
.chat-msg .cn { color: #58c858; font-weight: 700; }
.chat-msg .ct { color: #ddd; }
.chat-msg.sys .ct { color: #FFD700; font-style: italic; }
.chat-input-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; display: flex; background: rgba(0,20,60,0.95); border-top: 2px solid #58c858; padding: 6px 10px; gap: 8px; align-items: center; }
.chat-input { flex:1; min-width:0; background: rgba(255,255,255,0.1); border: 1px solid #58c858; border-radius: 8px; color:white; font-size:13px; padding: 7px 10px; font-family:inherit; outline:none; }
.chat-input::placeholder { color:#667; }
.chat-send { background:#58c858; border:none; color:white; font-size:13px; font-weight:700; padding: 7px 14px; border-radius: 8px; cursor:pointer; flex-shrink:0; }

/* 모달 공통 */
.modal-bg { position: fixed; inset:0; background: rgba(0,0,0,0.78); z-index:200; display:flex; align-items:center; justify-content:center; }
.modal { background: #fff; border: 3px solid #58c858; border-radius: 20px; padding: 22px; width: min(380px, 95vw); box-shadow: 0 8px 30px rgba(0,0,0,0.35); max-height: 92vh; overflow-y: auto; }
.modal-title { font-size:17px; font-weight:900; color:#206820; text-align:center; margin-bottom:4px; }
.modal-sub { font-size:11px; color:#888; text-align:center; margin-bottom:58px; }
.name-input { width:100%; padding:11px; border:2px solid #c8e6c9; border-radius:10px; font-size:14px; font-family:inherit; background:#f9fff9; outline:none; margin-bottom:12px; text-align:center; }
.name-input:focus { border-color:#58c858; }
.char-section-title { font-size:11px; font-weight:700; color:#388e3c; margin-bottom:8px; }
.char-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:58px; justify-content:center; }
.char-opt { width: calc(33% - 6px); border:2px solid #e0e0e0; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; background:#fafff9; transition:all 0.15s; padding:6px 4px; }
.char-opt.wide { width: calc(25% - 6px); }
.char-opt.pastor-only { border-color:#FFD700; background:#fffbf0; }
.char-opt.pastor-only.locked { opacity:0.4; cursor:not-allowed; }
.char-opt span { font-size:9px; color:#555; margin-top:4px; font-weight:600; text-align:center; }
.char-opt:hover:not(.locked) { border-color:#58c858; background:#f1faf1; }
.char-opt.sel { border-color:#58c858; background:#e8f5e9; box-shadow:0 0 0 2px #58c858; }
.enter-btn { width:100%; padding:13px; background:linear-gradient(180deg,#66bb6a,#43a047); border:none; border-radius:12px; color:white; font-size:15px; font-weight:900; font-family:inherit; cursor:pointer; box-shadow:0 4px 0 #2e7d32; }
.enter-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* 미니게임 모달 */
.game-modal { background: #1a1a2e; border: 3px solid #FFD700; border-radius: 20px; padding: 24px; width: min(420px, 95vw); box-shadow: 0 8px 30px rgba(0,0,0,0.5); max-height: 92vh; overflow-y: auto; }
.game-title { font-size:18px; font-weight:900; color:#FFD700; text-align:center; margin-bottom:6px; }
.game-sub { font-size:11px; color:#aaa; text-align:center; margin-bottom:16px; }
.verse-box { background: #0d0d1a; border: 2px solid #FFD700; border-radius: 12px; padding: 16px; margin-bottom:58px; }
.verse-ref { font-size:12px; color:#FFD700; font-weight:700; margin-bottom:8px; }
.verse-text { font-size:15px; color:white; line-height:1.8; font-weight:500; letter-spacing:0.3px; }
.game-input-area { display:none; margin-bottom:58px; }
.game-input { width:100%; padding:12px; background:#0d0d1a; border:2px solid #58c858; border-radius:10px; color:white; font-size:14px; font-family:inherit; outline:none; line-height:1.6; resize:none; }
.timer-display { font-size:28px; font-weight:900; color:#58c858; text-align:center; margin-bottom:12px; font-family:monospace; }
.game-btn { width:100%; padding:13px; border:none; border-radius:12px; font-size:15px; font-weight:900; font-family:inherit; cursor:pointer; margin-bottom:8px; }
.game-btn-start { background:linear-gradient(180deg,#FFD700,#FFA000); color:#1a1a2e; box-shadow:0 4px 0 #e65100; }
.game-btn-close { background:rgba(255,255,255,0.1); color:#aaa; border:1px solid #444; }
.ranking-box { background:#0d0d1a; border:1px solid #333; border-radius:12px; padding:12px; margin-bottom:12px; }
.ranking-title { font-size:12px; color:#FFD700; font-weight:700; margin-bottom:8px; }
.rank-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #222; font-size:12px; }
.rank-item:last-child { border-bottom:none; }
.rank-num { width:24px; font-weight:700; color:#FFD700; }
.rank-name { flex:1; color:#eee; }
.rank-time { color:#58c858; font-weight:700; font-family:monospace; }
.rank-mine { background:rgba(88,200,88,0.1); border-radius:6px; padding:2px 4px; }
.result-box { background:#0d0d1a; border:2px solid #58c858; border-radius:12px; padding:16px; text-align:center; margin-bottom:12px; }
.result-time { font-size:36px; font-weight:900; color:#58c858; font-family:monospace; }
.result-label { font-size:12px; color:#aaa; margin-top:4px; }

/* 게임 참여 팝업 */
.popup { background: #1a2a1a; border: 3px solid #58c858; border-radius: 16px; padding: 20px; width: min(300px, 90vw); text-align:center; }
.popup-title { font-size:16px; font-weight:900; color:#FFD700; margin-bottom:8px; }
.popup-sub { font-size:12px; color:#aaa; margin-bottom:16px; line-height:1.6; }
.popup-btns { display:flex; gap:8px; }
.popup-btn { flex:1; padding:11px; border:none; border-radius:10px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; }
.popup-btn-yes { background:#58c858; color:white; }
.popup-btn-no { background:rgba(255,255,255,0.1); color:#aaa; border:1px solid #444; }

/* 게임/퀴즈 버튼 - 하단 가운데 */
.game-float-btn {
  position: fixed; left: 8px; top: 56px;
  z-index: 50; background: linear-gradient(180deg, #4a90d9, #2060b0);
  border: none; border-radius: 14px; padding: 7px 14px; color: white;
  font-size: 12px; font-weight: 900; font-family: inherit;
  cursor: pointer; box-shadow: 0 3px 0 #1a4080; display: none; white-space: nowrap;
}
.quiz-float-btn {
  position: fixed; right: 14px; bottom: 60px; z-index: 50;
  background: linear-gradient(180deg, #e04040, #b02020);
  border: none; border-radius: 20px; padding: 10px 16px; color: white;
  font-size: 13px; font-weight: 900; font-family: inherit;
  cursor: pointer; box-shadow: 0 3px 0 #801010; display: none; white-space: nowrap;
}

/* ── 퀴즈 카드 (상단 고정, 배경 안 덮음) ── */
.quiz-top-card {
  position: fixed; top: 48px; left: 50%; transform: translateX(-50%);
  z-index: 80; width: min(460px, 96vw);
  display: none;
}
.quiz-card {
  background: rgba(255,250,220,0.97); border: 3px solid #8B6914;
  border-radius: 16px; padding: 14px 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.quiz-badge {
  display: inline-block; background: #8B6914; color: white;
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; margin-bottom: 8px;
}
.quiz-question {
  font-size: clamp(13px, 2.5vw, 16px); font-weight: 900;
  color: #3a2000; line-height: 1.6; margin-bottom: 10px;
  text-align: center;
}
.quiz-timer-bar-wrap {
  background: #e0d0b0; border-radius: 10px; height: 8px;
  margin-bottom: 6px; overflow: hidden;
}
.quiz-timer-bar {
  height: 100%; background: #58c858; border-radius: 10px;
  transition: width 1s linear, background 0.3s;
}
.quiz-timer-bar.warning { background: #e04040; }
.quiz-timer-text {
  font-size: 13px; font-weight: 900; color: #8B6914;
  text-align: center; margin-bottom: 10px; font-family: monospace;
}
/* 입력 */
.quiz-input-row { display: flex; gap: 8px; margin-bottom: 4px; }
.quiz-input {
  flex: 1; padding: 10px; border: 3px solid #8B6914;
  border-radius: 10px; font-size: 15px; font-family: inherit;
  background: white; outline: none; text-align: center;
}
.quiz-input:focus { border-color: #e04040; }
.quiz-submit-btn {
  padding: 10px 14px; background: #e04040; border: none;
  border-radius: 10px; color: white; font-size: 13px;
  font-weight: 900; font-family: inherit; cursor: pointer;
}
/* OX */
.quiz-ox-row { display: flex; gap: 10px; margin-bottom: 4px; }
.quiz-ox-btn {
  flex: 1; padding: 12px; border: 3px solid #ddd;
  border-radius: 12px; font-size: 28px; cursor: pointer;
  background: white; transition: all 0.15s; font-family: inherit;
}
.quiz-ox-btn.sel-o { border-color: #58c858; background: #e8f5e9; }
.quiz-ox-btn.sel-x { border-color: #e04040; background: #ffeaea; }
/* 4지선다 */
.quiz-choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 4px; }
.quiz-choice-btn {
  padding: 10px 6px; border: 2px solid #8B6914;
  border-radius: 10px; font-size: 12px; font-weight: 600;
  cursor: pointer; background: white; text-align: center;
  font-family: inherit; transition: all 0.15s;
}
.quiz-choice-btn.selected { border-color: #e04040; background: #ffeaea; }
/* 정답 공개 */
.quiz-reveal {
  background: #e8f5e9; border: 3px solid #58c858;
  border-radius: 12px; padding: 12px; text-align: center;
  display: none; margin-top: 10px;
}
.quiz-reveal-label { font-size: 11px; color: #388e3c; font-weight: 700; margin-bottom: 4px; }
.quiz-reveal-answer { font-size: 22px; font-weight: 900; color: #1a6820; margin-bottom: 6px; }
.quiz-reveal-me { font-size: 14px; font-weight: 700; }
.quiz-reveal-me.correct { color: #388e3c; }
.quiz-reveal-me.wrong { color: #e04040; }
/* 대기 카드 */
.quiz-wait-card {
  background: rgba(255,250,220,0.97); border: 3px solid #8B6914;
  border-radius: 16px; padding: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  text-align: center;
}
.quiz-waiting-title { font-size: 18px; font-weight: 900; color: #3a2000; margin-bottom:6px; }
.quiz-waiting-sub { font-size: 12px; color: #888; }
/* 결과 모달 */
.quiz-result-modal {
  position: fixed; inset:0; background: rgba(0,0,0,0.78);
  z-index: 200; display: none; align-items: center; justify-content: center;
}
.quiz-result-card {
  background: #fffef0; border: 4px solid #8B6914; border-radius: 20px;
  padding: 24px; width: min(420px, 95vw);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  max-height: 80vh; overflow-y: auto;
}
.quiz-result-title { font-size: 22px; font-weight: 900; color: #3a2000; text-align: center; margin-bottom: 4px; }
.quiz-result-score { font-size: 52px; font-weight: 900; color: #e04040; text-align: center; }
.quiz-result-max { font-size: 14px; color: #888; text-align: center; margin-bottom: 16px; }
.quiz-result-list { border-top: 2px solid #e0d0b0; padding-top: 12px; margin-bottom: 16px; }
.quiz-result-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #e0d0b0; font-size: 12px;
}
.quiz-result-item .ri-q { color: #555; flex: 1; margin-right: 8px; }
.quiz-result-item .ri-a { font-weight: 700; white-space: nowrap; }
.ri-a.correct { color: #388e3c; }
.ri-a.wrong { color: #e04040; }
.quiz-result-close {
  width: 100%; padding: 13px; background: #8B6914;
  border: none; border-radius: 12px; color: white;
  font-size: 15px; font-weight: 900; font-family: inherit; cursor: pointer;
}
/* 목사님 컨트롤 패널 */
.quiz-master-ctrl {
  position: fixed; bottom: 110px; right: 14px; z-index: 110;
  background: rgba(0,0,0,0.9); border: 2px solid #FFD700;
  border-radius: 14px; padding: 12px 16px;
  display: none; flex-direction: column; gap: 8px; min-width: 180px;
}
.quiz-master-label { color: #FFD700; font-size: 11px; font-weight: 700; text-align: center; }
.quiz-ctrl-btn {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 900; font-family: inherit; cursor: pointer;
}
.quiz-ctrl-start { background: #58c858; color: white; }
.quiz-ctrl-stop { background: #e04040; color: white; }
#loadingBar { display:none; position:fixed; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#58c858,#FFD700,#58c858); background-size:200%; animation:shimmer 1s infinite; z-index:9999; }
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
</style>
</head>
<body>
<div id="loadingBar"></div>
<div class="bg"></div>

<div class="top-bar">
  <button class="back-btn" onclick="goBackToMarket()">🪙 데나리온 적립하기</button>
  <div class="top-title">🏘️ 동산지기 광장</div>
  <div class="top-right">
    <div class="online-badge" id="onlineBadge" onclick="toggleUsers()" style="cursor:pointer;">● 0명 ▾</div>
    <button class="exit-btn" onclick="leavePlaza()">🚪 나가기</button>
  </div>
</div>

<div class="users-panel" id="usersPanel">
  <div class="users-title">접속중</div>
  <div id="usersList"></div>
</div>

<div class="joystick">
  <div></div>
  <div class="jbtn" id="jUp" tabindex="-1" onmousedown="return false" ontouchstart="return false">▲</div>
  <div></div>
  <div class="jbtn" id="jLeft" tabindex="-1" onmousedown="return false" ontouchstart="return false">◀</div>
  <div class="jcenter"></div>
  <div class="jbtn" id="jRight" tabindex="-1" onmousedown="return false" ontouchstart="return false">▶</div>
  <div></div>
  <div class="jbtn" id="jDown" tabindex="-1" onmousedown="return false" ontouchstart="return false">▼</div>
  <div></div>
</div>

<!-- 게임 버튼 -->
<button class="game-float-btn" id="gameFloatBtn" onclick="showGamePopup()">📖 말씀 타자 게임</button>

<!-- 채팅 메시지 + 입력창 - 우측 상단 -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-box" id="chatBox"></div>
</div>
<div class="chat-input-bar" id="chatInputBar">
  <input class="chat-input" id="chatInput" placeholder="메시지 입력..." maxlength="30" onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat();}">
  <button class="chat-send" onclick="sendChat()">▶</button>
</div>

<!-- ── 퀴즈 상단 카드 (배경 안 덮음) ── -->
<div class="quiz-top-card" id="quizTopCard">
  <!-- 대기 -->
  <div class="quiz-wait-card" id="quizWaitCard">
    <div class="quiz-waiting-title">📖 성경 퀴즈 대회</div>
    <div class="quiz-waiting-sub">잠시 후 퀴즈가 시작됩니다!<br>준비해주세요 😊</div>
  </div>
  <!-- 문제 -->
  <div class="quiz-card" id="quizQCard" style="display:none">
    <div class="quiz-badge" id="quizBadge">문제 1/5</div>
    <div class="quiz-question" id="quizQuestion"></div>
    <div class="quiz-timer-bar-wrap"><div class="quiz-timer-bar" id="quizTimerBar"></div></div>
    <div class="quiz-timer-text" id="quizTimerText">5초</div>
    <div class="quiz-input-row" id="quizInputRow" style="display:none">
      <input class="quiz-input" id="quizInput" placeholder="답 입력..." maxlength="20"
        onkeydown="if(event.key==='Enter'){event.preventDefault();submitQuizAns();}">
      <button class="quiz-submit-btn" id="quizSubmitBtn" onclick="submitQuizAns()">제출</button>
    </div>
    <div class="quiz-ox-row" id="quizOxRow" style="display:none">

<script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyD3YZHM-GRqEQDQIR9shFQ7bZMhsBjB-NQ",
  authDomain: "talentmarket-7e480.firebaseapp.com",

function showLoading(on) { document.getElementById('loadingBar').style.display = on?'block':'none'; }

// ── 배경 자동 적용 ──
function applyBackground() {
  const koreaHour = (new Date().getUTCHours() + 9) % 24;
  const isNight = koreaHour >= 20 || koreaHour < 6;
  const isMobile = window.innerWidth < window.innerHeight;
  const f = isNight ? (isMobile?'bg_night_mobile.png':'bg_night_pc.png') : (isMobile?'bg_day_mobile.png':'bg_day_pc.png');
  document.querySelector('.bg').style.backgroundImage = `url('${f}')`;
}
applyBackground();
setInterval(applyBackground, 60000);
window.addEventListener('resize', applyBackground);

// ── 접속자 토글 ──
window.toggleUsers = function() {
  const panel = document.getElementById('usersPanel');
  panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
};
// 외부 클릭 시 닫기
document.addEventListener('click', e => {
  const badge = document.getElementById('onlineBadge');
  const panel = document.getElementById('usersPanel');
  if (badge && panel && !badge.contains(e.target) && !panel.contains(e.target)) {
    panel.style.display = 'none';
  }
});

// ── 퀴즈 중 UI 토글 ──
function setQuizMode(on) {
  document.getElementById('chatPanel').style.display = on ? 'none' : '';
  const cib = document.getElementById('chatInputBar'); if(cib) cib.style.display = on ? 'none' : '';
  document.getElementById('gameFloatBtn').style.display = on ? 'none' : (myName ? 'block' : 'none');
}

const isPastor = sessionStorage.getItem('isPastor') === 'true';

const SESSION_KEY = 'plaza_session';
function saveSession(name, charId) { localStorage.setItem(SESSION_KEY, JSON.stringify({name, charId})); }
function loadSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; } }

const CHARS = [
  {id:'char1', img:'char1.png', n:'기본청년'},
  {id:'char2', img:'char2.png', n:'안경청년'},
  {id:'char3', img:'char3.png', n:'활동형'},
  {id:'char4', img:'char4.png', n:'기본자매'},
  {id:'char5', img:'char5.png', n:'단발자매'},
  {id:'char6', img:'char6.png', n:'긴머리자매'},
  {id:'char7', img:'char7.png', n:'남무영목사님', pastorOnly:true},
];

let selChar = null;
const charGridEl = document.getElementById('charGrid');
CHARS.forEach((c, idx) => {
  const d = document.createElement('div');
  const locked = c.pastorOnly && !isPastor;
  d.className = 'char-opt' + (idx >= 3 ? ' wide' : '') + (c.pastorOnly?' pastor-only':'') + (locked?' locked':'');
  d.innerHTML = `<img src="${c.img}" style="width:48px;height:62px;object-fit:contain"><span>${c.n}${c.pastorOnly?'<br>👑':''}${locked?'<br>🔒':''}</span>`;
  if (!locked) {
    d.onclick = () => {
      document.querySelectorAll('.char-opt').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel'); selChar = c; checkReady();
    };
  }
  charGridEl.appendChild(d);
});

const prev = loadSession();
if (prev) {
  document.getElementById('nameInput').value = prev.name;
  const found = CHARS.findIndex(c => c.id === prev.charId && !(c.pastorOnly && !isPastor));
  if (found >= 0) charGridEl.children[found].click();
}
document.getElementById('nameInput').addEventListener('input', checkReady);
function checkReady() {
  document.getElementById('enterBtn').disabled = !document.getElementById('nameInput').value.trim() || !selChar;
}

if (prev && prev.name && prev.charId) {
  const foundChar = CHARS.find(c => c.id === prev.charId && !(c.pastorOnly && !isPastor));
  if (foundChar) {
    document.getElementById('modal').style.display = 'none';
    const toast = document.createElement('div');
    toast.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,20,60,0.92);color:white;padding:16px 24px;border-radius:16px;border:2px solid #58c858;font-size:14px;font-weight:700;z-index:9999;text-align:center;`;
    toast.innerHTML = `${foundChar.img ? `<img src="${foundChar.img}" style="width:50px;height:65px;object-fit:contain;display:block;margin:0 auto 8px">` : ''}${prev.name}님으로 입장 중...`;
    document.body.appendChild(toast);
    selChar = foundChar;
    setTimeout(() => { toast.remove(); enterPlaza(); }, 1200);
  }
}

const myId = 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
let myX, myY, myName='', myImg='';
const bubbleTimers = {};
const moveState = {};
const SPEED = 3;
let W = window.innerWidth, H = window.innerHeight;
let myRef = null;
window.addEventListener('resize', ()=>{W=window.innerWidth;H=window.innerHeight;});

window.goBackToMarket = function() {
  if (myRef) remove(myRef);
  window.location.href = 'index.html';
};

window.leavePlaza = async function() {
  localStorage.removeItem(SESSION_KEY);
  if (myRef) {
    await push(ref(db,'chat'), {system:true, text:`👤 ${myName}님이 퇴장했어요.`, t:Date.now()});
    await remove(myRef);
  }
  window.location.href = 'index.html';
};
window.addEventListener('beforeunload', ()=>{ if(myRef) remove(myRef); if(isPastor) remove(ref(db,'quiz')); });

function renderPlayer(id, name, emoji, x, y, isMe) {
  let el = document.getElementById('pl_'+id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'pl_'+id;
    el.className = 'player'+(isMe?' my-player':'');
    document.body.appendChild(el);
  }
  el.style.left = x+'px';
  el.style.top = y+'px';
  if (el.dataset.emoji !== emoji) {
    el.dataset.emoji = emoji;
    const bubble = el.querySelector('.player-bubble');
    el.innerHTML = `<img class="player-sprite" src="${emoji}"/><div class="player-shadow"></div><div class="player-name">${name}</div>`;
    if (bubble) el.insertBefore(bubble, el.firstChild);
  }
}

let lastPosUpdate = 0;
function updateMyPos() {
  renderPlayer(myId, myName, myImg, myX, myY, true);
  const now = Date.now();
  if (now - lastPosUpdate > 100) {
    lastPosUpdate = now;
    if (myRef) set(myRef, {name:myName, emoji:myImg, x:myX/W, y:myY/H, t:now});
  }
}

['Up','Down','Left','Right'].forEach(dir => {
  const btn = document.getElementById('j'+dir);
  const d = dir.toLowerCase();
  btn.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation(); btn.blur();
    moveState[d]=true; btn.classList.add('pressed');
  });
  btn.addEventListener('pointerup', ()=>{moveState[d]=false;btn.classList.remove('pressed');});
  btn.addEventListener('pointerleave', ()=>{moveState[d]=false;btn.classList.remove('pressed');});
  btn.addEventListener('focus', e=>{ e.preventDefault(); btn.blur(); });
});
document.addEventListener('keydown', e=>{
  if(['ArrowLeft','a'].includes(e.key)) moveState.left=true;
  if(['ArrowRight','d'].includes(e.key)) moveState.right=true;
  if(['ArrowUp','w'].includes(e.key)) moveState.up=true;
  if(['ArrowDown','s'].includes(e.key)) moveState.down=true;
});
document.addEventListener('keyup', e=>{
  if(['ArrowLeft','a'].includes(e.key)) moveState.left=false;
  if(['ArrowRight','d'].includes(e.key)) moveState.right=false;
  if(['ArrowUp','w'].includes(e.key)) moveState.up=false;
  if(['ArrowDown','s'].includes(e.key)) moveState.down=false;
});
setInterval(()=>{
  if(!myName) return;
  let moved=false;
  if(moveState.left)  {myX=Math.max(20,myX-SPEED);moved=true;}
  if(moveState.right) {myX=Math.min(W-20,myX+SPEED);moved=true;}
  if(moveState.up)    {myY=Math.max(H*0.1,myY-SPEED);moved=true;}
  if(moveState.down)  {myY=Math.min(H*0.85,myY+SPEED);moved=true;}
  if(moved) updateMyPos();
},16);

window.showGamePopup = function() {
  if (!myName) return;
  const todayKey = getTodayKey();
  const played = localStorage.getItem(`game_played_${myName}_${todayKey}`);
  if (played) { alert('오늘은 이미 도전했어요! 내일 다시 도전하세요 😊'); return; }
  document.getElementById('gamePopup').style.display = 'flex';
};

window.enterPlaza = async function() {
  myName = document.getElementById('nameInput').value.trim();
  myImg = selChar.img;

  showLoading(true);
  const snap = await new Promise(resolve => onValue(ref(db,'plaza'), s=>resolve(s), {onlyOnce:true}));
  showLoading(false);

  const existing = snap.val()||{};
  const isDup = Object.values(existing).some(p=>p.name===myName);
  if (isDup) { alert(`"${myName}" 닉네임은 이미 사용 중이에요!`); return; }

  saveSession(myName, selChar.id);
  myX = W/2 + (Math.random()-0.5)*120;
  myY = H*0.65;
  document.getElementById('modal').style.display = 'none';

  myRef = ref(db,`plaza/${myId}`);
  set(myRef, {name:myName, emoji:myImg, x:myX/W, y:myY/H, t:Date.now()});
  onDisconnect(myRef).remove();

  setInterval(()=>{
    if(myRef&&myName) set(myRef,{name:myName,emoji:myImg,x:myX/W,y:myY/H,t:Date.now()});
  },30000);

  let plazaRenderTimer = null;
  onValue(ref(db,'plaza'), snap=>{
    if (plazaRenderTimer) return;
    plazaRenderTimer = setTimeout(()=>{
      plazaRenderTimer = null;
      const data=snap.val()||{};
      const now=Date.now();
      Object.entries(data).forEach(([id,p])=>{
        if(id===myId) return;
        if(p.t&&now-p.t>60000) remove(ref(db,`plaza/${id}`));
      });
      document.querySelectorAll('.player:not(.my-player)').forEach(el=>el.remove());
      const active=Object.entries(data).filter(([id,p])=>id!==myId&&p.t&&now-p.t<=60000);
      active.forEach(([id,p])=>renderPlayer(id,p.name,p.emoji,p.x*W,p.y*H,false));
      document.getElementById('onlineBadge').textContent=`● ${active.length+1}명`;
      document.getElementById('usersList').innerHTML=
        [{name:myName},...active.map(([,p])=>({name:p.name}))]
        .map(p=>`<div class="user-item"><div class="user-dot"></div>${p.name}</div>`).join('');
    }, 500);
  });

  let lastSeenT = Date.now();
  onValue(query(ref(db,'chat'),limitToLast(50)), snap=>{
    const data=snap.val()||{};
    const msgs=Object.values(data).sort((a,b)=>(a.t||0)-(b.t||0));
    const box=document.getElementById('chatBox');
    box.innerHTML=msgs.map(m=>
      m.system
        ?`<div class="chat-msg sys"><span class="ct">${m.text}</span></div>`
        :`<div class="chat-msg"><span class="cn">${m.name}</span> <span class="ct">${m.text}</span></div>`
    ).join('');
    // DOM 렌더 후 스크롤
    setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);

    const now2=Date.now();
    const newMsgs=msgs.filter(m=>!m.system&&m.t&&m.t>lastSeenT&&m.t>now2-10000);
    if(newMsgs.length>0) lastSeenT=Math.max(...newMsgs.map(m=>m.t));
    const latestByName={};
    newMsgs.forEach(m=>{if(!latestByName[m.name]||m.t>latestByName[m.name].t) latestByName[m.name]=m;});
    Object.values(latestByName).forEach(m=>{
      if(m.name===myName) return;
      document.querySelectorAll('.player').forEach(el=>{
        const nameEl=el.querySelector('.player-name');
        if(nameEl&&nameEl.textContent.trim()===m.name.trim()){
          let b=el.querySelector('.player-bubble');
          if(!b){b=document.createElement('div');b.className='player-bubble';el.insertBefore(b,el.firstChild);}
          b.className='player-bubble';
          b.textContent=m.text;
          clearTimeout(bubbleTimers[m.name]);
          bubbleTimers[m.name]=setTimeout(()=>{if(b.parentNode)b.remove();},5000);
        }
      });
    });
  });

  push(ref(db,'chat'),{system:true,text:`👤 ${myName}님이 입장했어요!`,t:Date.now()});
  renderPlayer(myId,myName,myImg,myX,myY,true);

  document.getElementById('gameFloatBtn').style.display = 'block';
  if (isPastor) document.getElementById('quizFloatBtn').style.display = 'block';

  initQuizListener();
};

window.sendChat = function() {
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text||!myName) return;
  input.value='';
  push(ref(db,'chat'),{name:myName,emoji:myImg,text,t:Date.now()});
  const el=document.getElementById('pl_'+myId);
  if(el){
    let b=el.querySelector('.player-bubble');
    if(!b){b=document.createElement('div');b.className='player-bubble';el.insertBefore(b,el.firstChild);}
    b.className='player-bubble';
    b.textContent=text;
    clearTimeout(bubbleTimers[myId]);
    bubbleTimers[myId]=setTimeout(()=>{if(b.parentNode)b.remove();},5000);
  }
};

// ── 말풍선에 퀴즈 답변 표시 ──
function showQuizBubble(playerName, answer, state) {
  // state: 'pending' | 'correct' | 'wrong'
  const allPlayers = document.querySelectorAll('.player');
  allPlayers.forEach(el => {
    const nameEl = el.querySelector('.player-name');
    const isMe = el.id === 'pl_' + myId;
    const targetName = isMe ? myName : (nameEl ? nameEl.textContent.trim() : '');
    if (targetName !== playerName) return;
    let b = el.querySelector('.player-bubble');
    if (!b) { b = document.createElement('div'); el.insertBefore(b, el.firstChild); }
    b.className = 'player-bubble quiz-bubble quiz-' + state;
    b.textContent = answer;
    // 말풍선 after 색도 동적으로
    b.style.setProperty('--bc',
      state==='correct'?'#58c858': state==='wrong'?'#e04040':'#aaa');
  });
}

function clearQuizBubbles() {
  document.querySelectorAll('.player-bubble.quiz-bubble').forEach(b => b.remove());
}

function getTodayKey() {
  const now = new Date();
  const korea = new Date(now.getTime() + 9*60*60*1000);
  return `${korea.getUTCFullYear()}-${String(korea.getUTCMonth()+1).padStart(2,'0')}-${String(korea.getUTCDate()).padStart(2,'0')}`;
}
function getTodayVerse() {
  const key = getTodayKey();
  const dayNum = parseInt(key.replace(/-/g,''));
  return VERSES[dayNum % VERSES.length];
}

let gameStartTime = null, gameTimer = null, gameFinished = false;

window.openGame = function() {
  document.getElementById('gamePopup').style.display = 'none';
  const verse = getTodayVerse();
  const todayKey = getTodayKey();
  document.getElementById('verseRef').textContent = verse.ref;
  document.getElementById('verseText').textContent = verse.text;
  document.getElementById('gameDate').textContent = `📅 ${todayKey} 오늘의 말씀`;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('gameInputArea').style.display = 'none';
  document.getElementById('timerDisplay').style.display = 'none';
  document.getElementById('resultBox').style.display = 'none';
  gameFinished = false; gameStartTime = null;
  document.getElementById('gameModal').style.display = 'flex';
  loadGameRanking();
};

window.startGame = function() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('gameInputArea').style.display = 'block';
  document.getElementById('timerDisplay').style.display = 'block';
  const gameInputEl = document.getElementById('gameInput');
  gameInputEl.value = '';
  gameInputEl.focus();
  gameInputEl.addEventListener('paste', e=>{ e.preventDefault(); alert('붙여넣기는 사용할 수 없어요!'); });
  gameInputEl.addEventListener('drop', e=>{ e.preventDefault(); });
  gameInputEl.addEventListener('contextmenu', e=>{ e.preventDefault(); });
  gameStartTime = Date.now();
  gameTimer = setInterval(()=>{
    const elapsed = (Date.now()-gameStartTime)/1000;
    document.getElementById('timerDisplay').textContent = elapsed.toFixed(2)+'초';
  },50);
};

window.submitGame = async function() {
  if (!gameStartTime || gameFinished) return;
  const input = document.getElementById('gameInput').value;
  const verse = getTodayVerse();
  const normalize = s => s.replace(/\s+/g,' ').trim();
  const inputNorm = normalize(input);
  const verseNorm = normalize(verse.text);
  const minLen = Math.min(inputNorm.length, verseNorm.length);
  let match = 0;
  for (let i=0; i<minLen; i++) { if(inputNorm[i]===verseNorm[i]) match++; }
  const similarity = minLen > 0 ? match/verseNorm.length : 0;
  if (inputNorm.length < verseNorm.length * 0.8) { alert(`말씀을 끝까지 입력해야 제출할 수 있어요 📖`); return; }
  if (similarity < 0.7) { alert(`너무 많이 틀렸어요!\n(정확도: ${Math.round(similarity*100)}%)`); document.getElementById('gameInput').value=''; document.getElementById('gameInput').focus(); return; }
  gameFinished = true;
  clearInterval(gameTimer);
  const elapsed = (Date.now()-gameStartTime)/1000;
  document.getElementById('gameInputArea').style.display = 'none';
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('resultTime').textContent = elapsed.toFixed(2)+'초';
  document.getElementById('resultBox').innerHTML += `<div style="font-size:11px;color:#58c858;margin-top:6px">정확도 ${Math.round(similarity*100)}%</div>`;
  const todayKey = getTodayKey();
  localStorage.setItem(`game_played_${myName}_${todayKey}`, '1');
  await set(ref(db,`game/${todayKey}/${myName.replace(/[.#$/[\]]/g,'_')}`), {
    name: myName, time: elapsed, accuracy: Math.round(similarity*100), t: Date.now()
  });
  loadGameRanking();
};

async function loadGameRanking() {
  const todayKey = getTodayKey();
  const snap = await get(ref(db,`game/${todayKey}`));
  const data = snap.val()||{};
  const sorted = Object.values(data).sort((a,b)=>a.time-b.time);
  const rankEl = document.getElementById('gameRanking');
  if (!rankEl) return;
  if (sorted.length===0) { rankEl.innerHTML = '<div style="color:#666;font-size:11px;text-align:center;padding:8px">아직 도전자가 없어요!</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  rankEl.innerHTML = sorted.slice(0,10).map((r,i)=>`
    <div class="rank-item ${r.name===myName?'rank-mine':''}">
      <div class="rank-num">${medals[i]||`${i+1}`}</div>
      <div class="rank-name">${r.name}</div>
      <div class="rank-time">${r.time.toFixed(2)}초</div>
    </div>
  `).join('');
}

window.closeGamePopup = function() { document.getElementById('gamePopup').style.display='none'; };
window.closeGame = function() { clearInterval(gameTimer); document.getElementById('gameModal').style.display='none'; };

let quizState = {
  active: false, qIdx: 0, questions: [],
  myAnswer: null, answered: false,
  score: 0, history: [],
  revealedIdx: -1,
  resultShown: false,
  timerInterval: null, listenerUnsubscribe: null,
};

function resetQuizState() {
  clearInterval(quizState.timerInterval);
  quizState = {
    active: false, qIdx: 0, questions: [],
    myAnswer: null, answered: false,
    score: 0, history: [],
    revealedIdx: -1,
    resultShown: false,
    timerInterval: null,
    listenerUnsubscribe: quizState.listenerUnsubscribe,
  };
}

function initQuizListener() {
  if (quizState.listenerUnsubscribe) return;
  quizState.listenerUnsubscribe = onValue(ref(db, 'quiz'), snap => {
    const data = snap.val();
    if (!data || !data.status) {
      closeQuizUI();
      return;
    }
    handleQuizState(data);
  });
}

function handleQuizState(data) {
  const card = document.getElementById('quizTopCard');
  card.style.display = 'block';
  setQuizMode(true);

  if (data.status === 'waiting') {
    showQuizWaiting();
  } else if (data.status === 'question') {
    const q = data.currentQ;
    const idx = data.qIdx || 0;
    if (quizState.active && quizState.qIdx === idx && quizState.answered) return;
    quizState.active = true;
    quizState.qIdx = idx;
    quizState.answered = false;
    quizState.myAnswer = null;
    clearQuizBubbles();
    showQuizQuestion(q, idx, data.startedAt);
  } else if (data.status === 'reveal') {
    showQuizReveal(data.currentQ, data.answers || {});
  } else if (data.status === 'finished') {
    showQuizFinalResult();
  }
}

function showQuizWaiting() {
  document.getElementById('quizWaitCard').style.display = 'block';
  document.getElementById('quizQCard').style.display = 'none';
}

function showQuizQuestion(q, idx, startedAt) {
  document.getElementById('quizWaitCard').style.display = 'none';
  document.getElementById('quizQCard').style.display = 'block';
  document.getElementById('quizReveal').style.display = 'none';

  document.getElementById('quizBadge').textContent = `문제 ${idx+1} / 5`;
  document.getElementById('quizQuestion').textContent = q.q;

  document.getElementById('quizInputRow').style.display = 'none';
  document.getElementById('quizOxRow').style.display = 'none';
  document.getElementById('quizChoicesGrid').style.display = 'none';
  document.getElementById('quizInput').value = '';
  document.getElementById('quizInput').disabled = false;
  // 제출 버튼 초기화
  const qsb1 = document.getElementById('quizSubmitBtn');
  if (qsb1) { qsb1.textContent = '제출'; submitBtn1.style.background = '#e04040'; }
  document.getElementById('quizTimerText').style.display = '';
  document.getElementById('quizTimerBar').parentElement.style.display = '';
  document.querySelectorAll('.quiz-ox-btn').forEach(b => b.className = 'quiz-ox-btn');

  if (q.type === 'blank' || q.type === 'short') {
    document.getElementById('quizInputRow').style.display = 'flex';
    setTimeout(() => document.getElementById('quizInput').focus(), 100);
  } else if (q.type === 'ox') {
    document.getElementById('quizOxRow').style.display = 'flex';
  } else if (q.type === 'choice') {
    const grid = document.getElementById('quizChoicesGrid');
    grid.style.display = 'grid';
    grid.innerHTML = q.choices.map(c =>
      `<button class="quiz-choice-btn" onclick="pickChoice('${c.replace(/'/g,"\\'")}')">${c}</button>`
    ).join('');
  }

  clearInterval(quizState.timerInterval);
  const elapsed = (Date.now() - (startedAt || Date.now())) / 1000;
  let timeLeft = Math.max(0, Math.ceil(7 - elapsed));

  const bar = document.getElementById('quizTimerBar');
  const txt = document.getElementById('quizTimerText');
  bar.style.width = (timeLeft / 7 * 100) + '%';
  bar.className = 'quiz-timer-bar' + (timeLeft <= 3 ? ' warning' : '');
  txt.textContent = timeLeft + '초';

  if (timeLeft <= 0) { handleTimeout(); return; }

  quizState.timerInterval = setInterval(() => {
    timeLeft--;
    bar.style.width = (timeLeft / 7 * 100) + '%';
    bar.className = 'quiz-timer-bar' + (timeLeft <= 3 ? ' warning' : '');
    txt.textContent = timeLeft + '초';
    if (timeLeft <= 0) {
      clearInterval(quizState.timerInterval);
      if (!quizState.answered) handleTimeout();
    }
  }, 1000);
}

function handleTimeout() {
  if (quizState.answered) return;
  quizState.answered = true;
  // 선택/입력된 값이 있으면 그걸로, 없으면 미입력
  const inputVal = document.getElementById('quizInput').value.trim();
  const currentVal = quizState.myAnswer || inputVal || '(미입력)';
  quizState.myAnswer = currentVal;
  // 타이머 텍스트 유지
  document.getElementById('quizInput').disabled = true;
  const qsb2 = document.getElementById('quizSubmitBtn');
  if (qsb2) { qsb2.textContent = currentVal === '(미입력)' ? '⏰' : '✅'; qsb2.style.background = currentVal === '(미입력)' ? '#aaa' : '#58c858'; }
  showQuizBubble(myName, currentVal === '(미입력)' ? '⏰' : currentVal, currentVal === '(미입력)' ? 'wrong' : 'pending');
  saveMyAnswer(currentVal);
}

function showQuizReveal(q, answers) {
  clearInterval(quizState.timerInterval);

  // 이미 이 문제 reveal 처리했으면 스킵 (중복 방지)
  if (quizState.revealedIdx === quizState.qIdx) return;
  quizState.revealedIdx = quizState.qIdx;

  const correct = q.a;
  const myAns = quizState.myAnswer || '(미입력)';
  const normalize = s => s.replace(/\s+/g, '').trim();
  const isCorrect = myAns !== '(미입력)' && normalize(myAns) === normalize(correct);

  if (isCorrect) quizState.score += 5;
  quizState.history.push({
    q: q.q.length > 22 ? q.q.substring(0,22)+'...' : q.q,
    myA: myAns, correct, isCorrect
  });

  document.getElementById('quizTimerText').style.display = 'none';
  document.getElementById('quizTimerBar').parentElement.style.display = 'none';
  document.getElementById('quizReveal').style.display = 'block';
  document.getElementById('quizRevealAnswer').textContent = correct + (q.explain ? ` (${q.explain})` : '');
  const meEl = document.getElementById('quizRevealMe');
  if (myAns === '(미입력)') {
    meEl.textContent = '⏰ 시간 초과!'; meEl.className = 'quiz-reveal-me wrong';
  } else if (isCorrect) {
    meEl.textContent = '🎉 정답! +5 데나리온'; meEl.className = 'quiz-reveal-me correct';
  } else {
    meEl.textContent = `❌ 오답 (내 답: ${myAns})`; meEl.className = 'quiz-reveal-me wrong';
  }

  // 모든 유저 말풍선 정답/오답으로 업데이트
  Object.entries(answers).forEach(([nameKey, ans]) => {
    const realName = nameKey.replace(/_/g, ' ');
    const isRight = ans.trim() === correct.trim();
    // Firebase key에서 원래 이름 찾기 (plaza 데이터 기준)
    document.querySelectorAll('.player').forEach(el => {
      const nameEl = el.querySelector('.player-name');
      const pName = el.id === 'pl_'+myId ? myName : (nameEl ? nameEl.textContent.trim() : '');
      const pKey = pName.replace(/[.#$\[\]]/g,'_');
      if (pKey !== nameKey) return;
      let b = el.querySelector('.player-bubble');
      if (!b) { b = document.createElement('div'); el.insertBefore(b, el.firstChild); }
      b.className = 'player-bubble quiz-bubble ' + (isRight ? 'quiz-correct' : 'quiz-wrong');
      b.textContent = ans === '(미입력)' ? '⏰' : ans;
    });
  });
}

function showQuizFinalResult() {
  clearInterval(quizState.timerInterval);
  // 이미 결과 표시했으면 스킵 (중복 방지)
  if (quizState.resultShown) return;
  quizState.resultShown = true;
  document.getElementById('quizTopCard').style.display = 'none';
  document.getElementById('quizResultModal').style.display = 'flex';
  document.getElementById('quizResultScore').textContent = quizState.score;

  const list = document.getElementById('quizResultList');
  list.innerHTML = quizState.history.map(h => `
    <div class="quiz-result-item">
      <span class="ri-q">${h.q}</span>
      <span class="ri-a ${h.isCorrect?'correct':'wrong'}">${h.isCorrect?'✅':'❌'} ${h.myA}</span>
    </div>
  `).join('');

  setQuizMode(false);
  clearQuizBubbles();

  if (quizState.score > 0 && myName) {
    const GAS = 'https://script.google.com/macros/s/AKfycbxoVhMwEQuxXsQX_8GzzucY6LJggktnZW7SKfXXf23DGiJVzzdJb-1Za0zatedIbW6e/exec';
    const form = new FormData();
    form.append('data', JSON.stringify({
      action:'submit', name:myName,
      actions:[{id:'quiz', name:'퀴즈 정답 보상', coins:quizState.score}],
      totalCoins:quizState.score,
      memo:`퀴즈 ${quizState.score}점 (${quizState.score/5}문제 정답)`,
      photos:[], manual:true
    }));
    fetch(GAS, {method:'POST', body:form})
      .then(r=>r.json())
      .then(async ()=>{
        const listRes = await fetch(`${GAS}?action=getAll`);
        const listData = await listRes.json();
        const myPending = (listData.requests||[])
          .filter(r=> r.name===myName && r.status==='pending')
          .sort((a,b)=> b.submittedAt - a.submittedAt);
        if (myPending.length > 0) await fetch(`${GAS}?action=approve&id=${myPending[0].id}`);
      })
      .catch(()=>{});
  }
}

  resetQuizState();
  const shuffled = [...QUIZ_BANK].sort(()=>Math.random()-0.5).slice(0,5);
  quizState.questions = shuffled;
  quizState.score = 0;
  quizState.history = [];
  await set(ref(db,'quiz'), { status:'waiting', startedAt: Date.now() });
  document.getElementById('quizCtrlStart').style.display = 'none';
  document.getElementById('quizCtrlStop').style.display = 'block';
  setTimeout(() => runNextQuestion(shuffled, 0), 3000);
};

async function runNextQuestion(questions, idx) {
  if (idx >= 5) {
    await set(ref(db,'quiz/status'), 'finished');
    setTimeout(async () => {
      await remove(ref(db,'quiz'));
      document.getElementById('quizCtrlStart').style.display = 'block';
      document.getElementById('quizCtrlStop').style.display = 'none';
    }, 7000);
    return;
  }
  await set(ref(db,'quiz'), {
    status: 'question', qIdx: idx,
    currentQ: questions[idx], answers: {}, startedAt: Date.now()
  });
  setTimeout(async () => {
    const snap = await get(ref(db,'quiz/answers'));
    const answers = snap.val() || {};
    await set(ref(db,'quiz'), {
      status: 'reveal', qIdx: idx,
      currentQ: questions[idx], answers, startedAt: Date.now()
    });
    setTimeout(() => runNextQuestion(questions, idx+1), 7000);
  }, 7000);
}

window.stopQuiz = async function() {
  await remove(ref(db,'quiz'));
  document.getElementById('quizCtrlStart').style.display = 'block';
  document.getElementById('quizCtrlStop').style.display = 'none';
  document.getElementById('quizMasterCtrl').style.display = 'none';
  closeQuizUI();
  resetQuizState();
};

// ── 채팅 1시간 자동 초기화 ──
async function cleanOldChats() {
  const snap = await get(ref(db,'chat'));
  const data = snap.val();
  if (!data) return;
  const oneHourAgo = Date.now() - 60*60*1000;
  const updates = {};
  Object.entries(data).forEach(([k,v]) => {
    if (v.t && v.t < oneHourAgo) updates[k] = null;
  });
  if (Object.keys(updates).length > 0) {
    const { update } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    update(ref(db,'chat'), updates);
  }
}
setTimeout(cleanOldChats, 5000);
setInterval(cleanOldChats, 30*60*1000);

</script>
